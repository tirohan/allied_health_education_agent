name: allied-health-ai

services:
  qdrant:
    image: qdrant/qdrant:v1.15.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    # Qdrant image is minimal; rely on port readiness via depends_on + API retries.
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      # Override only Docker networking values. Secrets come from ../.env.
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://tanbinislam@host.docker.internal:5432/allied_health_edu}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
      - redis
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      [
        "streamlit",
        "run",
        "frontend/app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
        "--server.headless=true",
        "--browser.gatherUsageStats=false",
      ]
    env_file:
      - ../.env
    environment:
      # Streamlit server calls the API over the Docker network. API_KEY (if set)
      # comes from ../.env via env_file above, so it stays in sync with the api
      # service's auth requirement.
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  qdrant_storage:
